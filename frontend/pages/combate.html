<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Combate - Card Game Anime</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        body { font-family: 'Chakra Petch', 'Segoe UI', sans-serif; }

        /* ===== CARD OVERRIDE (dark gaming) ===== */
        .card {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.95), rgba(35, 30, 80, 0.9));
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.15), 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            border-bottom: 1px solid rgba(139, 92, 246, 0.25);
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
        }

        .card-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.9rem;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.6);
            font-size: 0.9rem;
        }

        .combate-form {
            max-width: 700px;
            margin: 0 auto;
        }

        .vs-section {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 2rem;
            align-items: center;
            margin: 2rem 0;
        }

        .jugador-section {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.85), rgba(35, 30, 80, 0.75));
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.1);
        }

        .jugador-section h3 {
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1rem;
        }

        .vs-divider {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .ganador-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
        }

        .ganador-btn {
            flex: 1;
            padding: 1rem;
            border: 1px solid rgba(139, 92, 246, 0.4);
            background: rgba(15, 12, 41, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.15s;
            font-weight: 600;
            font-family: 'Chakra Petch', sans-serif;
            color: #e0d7ff;
        }

        @media (prefers-reduced-motion: reduce) {
            .ganador-btn { transition: none; }
        }

        .ganador-btn:hover {
            background: rgba(35, 30, 80, 0.8);
            border-color: rgba(167, 139, 250, 0.6);
            box-shadow: 0 0 14px rgba(124, 58, 237, 0.25);
        }

        .ganador-btn.selected {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.45), rgba(168, 85, 247, 0.35));
            border-color: rgba(167, 139, 250, 0.7);
            box-shadow: 0 0 22px rgba(124, 58, 237, 0.4);
            color: #e0d7ff;
            transform: translateY(-1px);
        }

        .limite-info {
            background: rgba(76, 29, 149, 0.25);
            border: 1px solid rgba(139, 92, 246, 0.4);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-family: 'Chakra Petch', sans-serif;
            color: #c4b5fd;
        }

        .limite-info strong {
            color: #e0d7ff;
            font-size: 1.4rem;
            font-family: 'Russo One', sans-serif;
        }

        .form-label {
            color: #c4b5fd;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .form-control,
        select.form-control,
        textarea.form-control {
            background: rgba(15, 12, 41, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #e0d7ff;
            font-family: 'Chakra Petch', sans-serif;
            border-radius: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control::placeholder,
        textarea.form-control::placeholder {
            color: rgba(167, 139, 250, 0.35);
        }

        .form-control:focus,
        select.form-control:focus,
        textarea.form-control:focus {
            border-color: rgba(167, 139, 250, 0.7);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
            outline: none;
        }

        select.form-control option {
            background: #1a1040;
            color: #e0d7ff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            color: #fff;
            font-family: 'Russo One', sans-serif;
            letter-spacing: 0.06em;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
            transition: box-shadow 0.2s, transform 0.15s;
        }

        @media (prefers-reduced-motion: reduce) {
            .btn-primary { transition: none; }
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 32px rgba(124, 58, 237, 0.65);
            transform: translateY(-1px);
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .vs-section {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin: 1rem 0;
            }

            .vs-divider {
                font-size: 1.5rem;
                text-align: center;
                margin: 0.5rem 0;
            }

            .jugador-section {
                padding: 1rem;
            }

            .jugador-section h3 {
                font-size: 1rem;
                margin-bottom: 0.75rem;
            }

            .ganador-options {
                flex-direction: column;
                gap: 0.75rem;
                margin: 1.5rem 0;
            }

            .ganador-btn {
                padding: 0.85rem;
                font-size: 0.95rem;
            }

            .limite-info {
                padding: 0.75rem;
                margin-bottom: 1rem;
                font-size: 0.9rem;
            }

            .limite-info strong {
                font-size: 1.2rem;
            }

            .combate-form {
                padding: 1rem;
            }
        }

        *:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <!-- Header Principal -->
    <header class="header-main">
        <div class="header-main-container">
            <div class="nav-brand">Card Game Anime</div>
            <div id="user-nav"></div>
        </div>
    </header>

    <!-- Header Navegación -->
    <nav class="header-nav">
        <div class="header-nav-container">
            <ul class="nav-links">
                <li><a href="historial.html">Historial</a></li>
                <li><a href="estadisticas.html">Estadísticas</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="noticias.html">Noticias</a></li>
                <li><a href="normas.html">Normas</a></li>
                <li><a href="combate.html">Registrar Combate</a></li>
                <li><a href="contador.html">Contador</a></li>
                <li><a href="compartir.html">Compartir</a></li>
                <li id="admin-link" style="display:none;"><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card combate-form">
            <div class="card-header">
                <h1 class="card-title">Registrar Combate</h1>
                <p class="card-subtitle">Registra tu partida (pendiente de aprobación del admin)</p>
            </div>

            <div id="limite-container" class="limite-info">
                <p>Partidas registradas hoy: <strong id="partidas-hoy">-</strong> / 10</p>
            </div>

            <form id="combate-form">
                <div class="vs-section">
                    <!-- Mi lado -->
                    <div class="jugador-section">
                        <h3>Yo</h3>
                        <div class="form-group">
                            <label class="form-label">Mi Mazo</label>
                            <select id="mi-mazo"></select>
                        </div>
                    </div>

                    <div class="vs-divider">VS</div>

                    <!-- Lado del oponente -->
                    <div class="jugador-section">
                        <h3>Oponente</h3>
                        <div class="form-group">
                            <label class="form-label">Jugador</label>
                            <select id="oponente"></select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Mazo del Oponente</label>
                            <select id="mazo-oponente"></select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">¿Quién ganó?</label>
                    <div class="ganador-options">
                        <button type="button" class="ganador-btn" data-ganador="yo">
                            Yo gané
                        </button>
                        <button type="button" class="ganador-btn" data-ganador="empate">
                            Empate
                        </button>
                        <button type="button" class="ganador-btn" data-ganador="oponente">
                            Perdí
                        </button>
                    </div>
                    <input type="hidden" id="ganador">
                </div>

                <div class="form-group">
                    <label class="form-label">Notas (opcional)</label>
                    <textarea id="notas" class="form-control" rows="3" placeholder="Ej: Partida épica, Luffy Gear 5 fue decisivo..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Registrar Combate
                </button>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/searchable-select.js"></script>
    <script>
        // Verificar autenticación
        if (!API.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        // Mostrar link de admin si es admin
        if (API.isAdmin()) {
            document.getElementById('admin-link').style.display = 'block';
        }

        let ganadorSeleccionado = null;
        let partidasHoy = 0;

        // SearchableSelects
        let selectMiMazo, selectOponente, selectMazoOponente;

        // Cargar datos e inicializar selects
        async function cargarDatos() {
            try {
                // Cargar mazos
                const resultMazos = await API.getMazos();
                const mazosOptions = resultMazos.success ? resultMazos.mazos.map(m => ({
                    id: m.id,
                    text: `${m.nombre} (${m.serie})`
                })).sort((a, b) => a.text.localeCompare(b.text)) : [];

                // Cargar usuarios
                const resultUsuarios = await API.getUsuarios();
                const miId = API.getUser().id;
                const usuariosOptions = resultUsuarios.success ? resultUsuarios.usuarios
                    .filter(u => u.id !== miId) // Excluir usuario actual
                    .map(u => ({
                        id: u.id,
                        text: u.nombre
                    })).sort((a, b) => a.text.localeCompare(b.text)) : [];

                // Inicializar SearchableSelects
                selectMiMazo = new SearchableSelect(document.getElementById('mi-mazo'), {
                    options: mazosOptions,
                    placeholder: 'Selecciona tu mazo',
                    searchPlaceholder: 'Buscar mazo...'
                });

                selectOponente = new SearchableSelect(document.getElementById('oponente'), {
                    options: usuariosOptions,
                    placeholder: 'Selecciona oponente',
                    searchPlaceholder: 'Buscar jugador...'
                });

                selectMazoOponente = new SearchableSelect(document.getElementById('mazo-oponente'), {
                    options: mazosOptions,
                    placeholder: 'Selecciona mazo del oponente',
                    searchPlaceholder: 'Buscar mazo...'
                });

            } catch (error) {
                console.error('Error cargando datos:', error);
                UI.showAlert('Error al cargar datos del formulario', 'error');
            }
        }

        // Manejo de botones de ganador
        document.querySelectorAll('.ganador-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ganador-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                ganadorSeleccionado = btn.dataset.ganador;
                document.getElementById('ganador').value = ganadorSeleccionado;
            });
        });

        // Enviar formulario
        document.getElementById('combate-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!ganadorSeleccionado) {
                UI.showAlert('Por favor selecciona quién ganó', 'error');
                return;
            }

            if (partidasHoy >= 10) {
                UI.showAlert('Has alcanzado el límite de 10 partidas por día', 'error');
                return;
            }

            // Obtener valores de los selects
            const oponenteId = selectOponente.getValue();
            const miMazoId = selectMiMazo.getValue();
            const mazoOponenteId = selectMazoOponente.getValue();

            if (!oponenteId || !miMazoId || !mazoOponenteId) {
                UI.showAlert('Por favor completa todos los campos correctamente', 'error');
                return;
            }

            const partidaData = {
                oponente_id: parseInt(oponenteId),
                mi_mazo_id: parseInt(miMazoId),
                mazo_oponente_id: parseInt(mazoOponenteId),
                ganador: ganadorSeleccionado,
                notas: document.getElementById('notas').value.trim() || null
            };

            try {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.textContent = 'Registrando...';

                const result = await API.registrarPartida(partidaData);

                if (result.success) {
                    UI.showAlert('¡Combate registrado! Pendiente de aprobación del admin.', 'success');

                    // Actualizar contador
                    partidasHoy = result.partidasHoy || partidasHoy + 1;
                    document.getElementById('partidas-hoy').textContent = partidasHoy;

                    // Limpiar formulario
                    document.getElementById('combate-form').reset();
                    document.querySelectorAll('.ganador-btn').forEach(b => b.classList.remove('selected'));
                    ganadorSeleccionado = null;

                    // Limpiar selects
                    selectMiMazo.clear();
                    selectOponente.clear();
                    selectMazoOponente.clear();

                    if (partidasHoy >= 10) {
                        UI.showAlert('Has alcanzado el límite de 10 partidas por día', 'warning');
                        btn.disabled = true;
                        btn.textContent = 'Límite alcanzado';
                    } else {
                        btn.disabled = false;
                        btn.textContent = 'Registrar Combate';
                    }
                } else {
                    throw new Error(result.message || 'Error al registrar combate');
                }

            } catch (error) {
                console.error('Error:', error);
                UI.showAlert(error.message || 'Error al registrar combate', 'error');
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = false;
                btn.textContent = 'Registrar Combate';
            }
        });

        // Inicializar
        document.addEventListener('DOMContentLoaded', cargarDatos);
    </script>
</body>
</html>
