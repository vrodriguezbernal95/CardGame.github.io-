<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Card Game Anime</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        .login-card {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.97), rgba(35, 30, 80, 0.92));
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.2), 0 30px 80px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 3rem 2.5rem;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.25rem;
        }

        .login-logo-icon {
            display: inline-block;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 16px;
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.5);
            line-height: 64px;
            font-size: 2rem;
        }

        .login-title {
            text-align: center;
            font-family: 'Russo One', sans-serif;
            font-size: 1.85rem;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .login-subtitle {
            text-align: center;
            color: rgba(167, 139, 250, 0.6);
            margin-bottom: 2rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.9rem;
        }

        .form-label {
            color: rgba(167, 139, 250, 0.85) !important;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .form-control {
            background: rgba(15, 12, 41, 0.8) !important;
            border: 1px solid rgba(139, 92, 246, 0.3) !important;
            color: #e0d7ff !important;
            font-family: 'Chakra Petch', sans-serif;
            border-radius: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control::placeholder {
            color: rgba(167, 139, 250, 0.35);
        }

        .form-control:focus {
            border-color: rgba(167, 139, 250, 0.7) !important;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2) !important;
            outline: none;
        }

        .form-control:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7) !important;
            border: none !important;
            color: #fff !important;
            font-family: 'Russo One', sans-serif !important;
            letter-spacing: 0.06em;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
            transition: box-shadow 0.2s, transform 0.15s;
        }

        @media (prefers-reduced-motion: reduce) {
            .btn-primary { transition: none; }
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.65);
            transform: translateY(-1px);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(167, 139, 250, 0.55);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.9rem;
        }

        .login-footer a {
            color: #a78bfa;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .login-footer a:hover {
            color: #e0d7ff;
        }

        *:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="login-logo-icon">&#9830;</span>
            </div>
            <h1 class="login-title">Card Game Anime</h1>
            <p class="login-subtitle">Inicia sesión para continuar</p>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar Sesión</button>

                <p class="login-footer mt-3">
                    ¿No tienes cuenta? <a href="register.html">Regístrate</a>
                </p>
            </form>

            <div id="message-container"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Redirigir si ya está logueado
        if (API.isAuthenticated()) {
            window.location.href = '../index.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageContainer = document.getElementById('message-container');

            try {
                const result = await API.login(email, password);

                if (result.success) {
                    messageContainer.innerHTML = '<div class="alert alert-success mt-3">¡Login exitoso! Redirigiendo...</div>';

                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 1000);
                }
            } catch (error) {
                messageContainer.innerHTML = `<div class="alert alert-error mt-3">${error.message || 'Error al iniciar sesión'}</div>`;
            }
        });
    </script>
</body>
</html>
