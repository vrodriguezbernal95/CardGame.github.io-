<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias - Card Game Anime</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        /* ── Card global overrides ── */
        .card {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.95), rgba(35, 30, 80, 0.9));
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.15), 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.6);
            font-size: 0.85rem;
        }

        /* ── Noticia card ── */
        .noticia-card {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.9), rgba(35, 30, 80, 0.85));
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
        }

        .noticia-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.25), 0 4px 20px rgba(0, 0, 0, 0.4);
            border-color: rgba(139, 92, 246, 0.45);
        }

        .noticia-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .noticia-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.35rem;
            letter-spacing: 0.03em;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .noticia-meta {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.6);
            font-size: 0.82rem;
            letter-spacing: 0.04em;
        }

        .noticia-imagen {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .noticia-extracto {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.75);
            line-height: 1.7;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .btn-leer-mas {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.35);
            transition: box-shadow 0.3s, transform 0.2s;
        }

        .btn-leer-mas:hover {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.6);
            transform: translateY(-1px);
        }

        .btn-leer-mas:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
        }

        /* ── Modal ── */
        .modal-noticia {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            overflow-y: auto;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.98), rgba(35, 30, 80, 0.97));
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.25), 0 30px 80px rgba(0, 0, 0, 0.6);
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 16px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.4);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .modal-close:focus-visible {
            outline: 2px solid #f87171;
            outline-offset: 2px;
        }

        .modal-imagen {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .modal-content-text {
            font-family: 'Chakra Petch', sans-serif;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #e0d7ff;
            font-size: 0.95rem;
        }

        /* ── Paginación retro ── */
        .pagination {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .pagination-btn {
            background: transparent;
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: rgba(167, 139, 250, 0.7);
            padding: 0.5rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: #a78bfa;
            color: #e0d7ff;
            background: rgba(124, 58, 237, 0.15);
        }

        .pagination-btn.active {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.4);
        }

        .pagination-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .pagination-btn:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
        }

        .pagination-ellipsis {
            color: rgba(167, 139, 250, 0.4);
            padding: 0.5rem 0.25rem;
            font-family: 'Chakra Petch', sans-serif;
        }

        .pagination-info {
            text-align: center;
            margin-top: 0.75rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.8rem;
            color: rgba(167, 139, 250, 0.5);
            letter-spacing: 0.04em;
        }

        /* ── Título en modal JS-generado ── */
        #modal-noticia-content h2 {
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        #modal-noticia-content .noticia-meta {
            margin-bottom: 1.5rem;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .modal-content {
                margin: 1rem;
                padding: 1.5rem;
            }

            .noticia-card {
                padding: 1.5rem;
            }

            .noticia-title {
                font-size: 1.1rem;
            }
        }

        /* ── Reducción de movimiento ── */
        @media (prefers-reduced-motion: reduce) {
            .noticia-card,
            .btn-leer-mas,
            .modal-close,
            .pagination-btn {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- Header Principal -->
    <header class="header-main">
        <div class="header-main-container">
            <div class="nav-brand">Card Game Anime</div>
            <div id="user-nav"></div>
        </div>
    </header>

    <!-- Header Navegación -->
    <nav class="header-nav">
        <div class="header-nav-container">
            <ul class="nav-links">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="historial.html">Historial</a></li>
                <li><a href="estadisticas.html">Estadísticas</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="noticias.html">Noticias</a></li>
                <li><a href="normas.html">Normas</a></li>
                <li><a href="combate.html">Registrar Combate</a></li>
                <li><a href="contador.html">Contador</a></li>
                <li><a href="compartir.html">Compartir</a></li>
                <li id="admin-link" style="display:none;"><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Noticias y Anuncios</h1>
                <p class="card-subtitle">Últimas noticias sobre torneos, mazos y eventos</p>
            </div>

            <div id="noticias-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="mt-2">Cargando noticias...</p>
                </div>
            </div>

            <!-- Controles de paginación -->
            <div id="paginacion-container" style="display: none;"></div>
        </div>
    </div>

    <!-- Modal para ver noticia completa -->
    <div id="modal-noticia" class="modal-noticia">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar">&times;</button>
            <div id="modal-noticia-content"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Mostrar link de admin si es admin
        if (API.isAdmin()) {
            document.getElementById('admin-link').style.display = 'block';
        }

        let paginaActual = 1;
        const NOTICIAS_POR_PAGINA = 10;

        // Cargar noticias
        async function cargarNoticias(pagina = 1) {
            const container = document.getElementById('noticias-container');
            paginaActual = pagina;

            try {
                const result = await API.getNoticias(pagina, NOTICIAS_POR_PAGINA);

                if (!result.success || result.noticias.length === 0) {
                    container.innerHTML = `
                        <p class="text-center" style="color: var(--text-secondary); padding: 2rem;">
                            No hay noticias publicadas todavía.
                        </p>
                    `;
                    document.getElementById('paginacion-container').style.display = 'none';
                    return;
                }

                renderizarNoticias(result.noticias);
                renderizarPaginacion(result.pagination);

            } catch (error) {
                container.innerHTML = `
                    <div class="alert alert-error">
                        Error al cargar las noticias: ${error.message}
                    </div>
                `;
            }
        }

        // Renderizar noticias
        function renderizarNoticias(noticias) {
            const container = document.getElementById('noticias-container');

            let html = '';

            noticias.forEach(noticia => {
                const fecha = new Date(noticia.fecha_creacion).toLocaleDateString('es-ES', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                const extracto = noticia.contenido.length > 300
                    ? noticia.contenido.substring(0, 300) + '...'
                    : noticia.contenido;

                html += `
                    <div class="noticia-card" onclick="verNoticia(${noticia.id})">
                        <div class="noticia-header">
                            <div>
                                <h2 class="noticia-title">${noticia.titulo}</h2>
                                <p class="noticia-meta">${fecha} &mdash; ${noticia.autor_nombre}</p>
                            </div>
                        </div>
                        ${noticia.imagen_url ? `<img src="${noticia.imagen_url}" alt="${noticia.titulo}" class="noticia-imagen">` : ''}
                        <p class="noticia-extracto">${extracto}</p>
                        <button class="btn-leer-mas">Leer más</button>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Renderizar paginación
        function renderizarPaginacion(pagination) {
            const container = document.getElementById('paginacion-container');

            if (pagination.totalPages <= 1) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';

            let html = '<div class="pagination">';

            // Botón Anterior
            html += `
                <button class="pagination-btn" ${!pagination.hasPrevPage ? 'disabled' : ''} onclick="cargarNoticias(${pagination.page - 1})">
                    &laquo; Anterior
                </button>
            `;

            // Números de página
            const maxBotones = 7;
            let inicio = Math.max(1, pagination.page - Math.floor(maxBotones / 2));
            let fin = Math.min(pagination.totalPages, inicio + maxBotones - 1);

            if (fin - inicio < maxBotones - 1) {
                inicio = Math.max(1, fin - maxBotones + 1);
            }

            // Primera página
            if (inicio > 1) {
                html += `<button class="pagination-btn" onclick="cargarNoticias(1)">1</button>`;
                if (inicio > 2) {
                    html += `<span class="pagination-ellipsis">...</span>`;
                }
            }

            // Páginas del medio
            for (let i = inicio; i <= fin; i++) {
                html += `
                    <button class="pagination-btn ${i === pagination.page ? 'active' : ''}" onclick="cargarNoticias(${i})">
                        ${i}
                    </button>
                `;
            }

            // Última página
            if (fin < pagination.totalPages) {
                if (fin < pagination.totalPages - 1) {
                    html += `<span class="pagination-ellipsis">...</span>`;
                }
                html += `<button class="pagination-btn" onclick="cargarNoticias(${pagination.totalPages})">${pagination.totalPages}</button>`;
            }

            // Botón Siguiente
            html += `
                <button class="pagination-btn" ${!pagination.hasNextPage ? 'disabled' : ''} onclick="cargarNoticias(${pagination.page + 1})">
                    Siguiente &raquo;
                </button>
            `;

            html += '</div>';

            // Info de página
            const inicio_registro = (pagination.page - 1) * pagination.limit + 1;
            const fin_registro = Math.min(pagination.page * pagination.limit, pagination.total);
            html += `
                <div class="pagination-info">
                    Mostrando ${inicio_registro}-${fin_registro} de ${pagination.total} noticias
                </div>
            `;

            container.innerHTML = html;
        }

        // Ver noticia completa
        async function verNoticia(id) {
            try {
                const result = await API.getNoticia(id);

                if (result.success) {
                    const noticia = result.noticia;
                    const fecha = new Date(noticia.fecha_creacion).toLocaleDateString('es-ES', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const modalContent = document.getElementById('modal-noticia-content');
                    modalContent.innerHTML = `
                        <h2>${noticia.titulo}</h2>
                        <p class="noticia-meta" style="margin-bottom: 1.5rem;">${fecha} &mdash; ${noticia.autor_nombre}</p>
                        ${noticia.imagen_url ? `<img src="${noticia.imagen_url}" alt="${noticia.titulo}" class="modal-imagen">` : ''}
                        <div class="modal-content-text">${noticia.contenido}</div>
                    `;

                    document.getElementById('modal-noticia').style.display = 'block';
                    document.body.style.overflow = 'hidden';
                }
            } catch (error) {
                console.error('Error:', error);
                UI.showAlert('Error al cargar la noticia', 'error');
            }
        }

        // Cerrar modal
        function cerrarModal() {
            document.getElementById('modal-noticia').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal-noticia').addEventListener('click', (e) => {
            if (e.target.id === 'modal-noticia') {
                cerrarModal();
            }
        });

        // Cargar noticias al iniciar
        document.addEventListener('DOMContentLoaded', () => cargarNoticias(1));
    </script>
</body>
</html>
