<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contador de Vidas - Card Game Anime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed;
            font-family: 'Chakra Petch', sans-serif;
            background: #06030f;
        }

        /* ===== LAYOUT ===== */
        .contador-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Central divider */
        .contador-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(167, 139, 250, 0.6) 20%,
                rgba(167, 139, 250, 0.9) 50%,
                rgba(167, 139, 250, 0.6) 80%,
                transparent 100%
            );
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.6);
            z-index: 10;
            pointer-events: none;
        }

        /* ===== PLAYER PANELS ===== */
        .jugador {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Background glow orb per player */
        .jugador::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.18;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .jugador-1 {
            background: linear-gradient(160deg, #07041a 0%, #0d0828 60%, #100530 100%);
        }

        .jugador-1::before {
            background: #4f46e5;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .jugador-2 {
            background: linear-gradient(200deg, #07041a 0%, #0d0828 60%, #100530 100%);
        }

        .jugador-2::before {
            background: #d946ef;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Critical: intensify glow */
        .jugador.critical-state::before {
            background: #ef4444 !important;
            opacity: 0.35;
        }

        /* ===== PLAYER NAME ===== */
        .nombre-jugador {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .jugador-1 .nombre-jugador {
            color: rgba(165, 155, 245, 0.8);
        }

        .jugador-2 .nombre-jugador {
            color: rgba(230, 135, 245, 0.8);
        }

        /* ===== LIFE DISPLAY ===== */
        .vidas-display {
            font-family: 'Russo One', sans-serif;
            font-size: clamp(7rem, 14vw, 11rem);
            line-height: 1;
            margin: 0.5rem 0 1rem;
            position: relative;
            z-index: 1;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }

        .jugador-1 .vidas-display {
            color: #e0d7ff;
            text-shadow:
                0 0 30px rgba(99, 86, 230, 0.8),
                0 0 60px rgba(79, 70, 229, 0.4);
        }

        .jugador-2 .vidas-display {
            color: #fce7ff;
            text-shadow:
                0 0 30px rgba(210, 100, 230, 0.8),
                0 0 60px rgba(217, 70, 239, 0.4);
        }

        .vidas-display.critical {
            animation: pulse-critical 0.8s ease-in-out infinite;
        }

        .jugador-1 .vidas-display.critical,
        .jugador-2 .vidas-display.critical {
            color: #fca5a5;
            text-shadow:
                0 0 30px rgba(239, 68, 68, 0.9),
                0 0 60px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse-critical {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* ===== HP BAR ===== */
        .hp-bar-container {
            width: 80%;
            max-width: 260px;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .hp-bar-track {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .hp-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease, background 0.5s ease;
        }

        .jugador-1 .hp-bar-fill {
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            box-shadow: 0 0 8px rgba(99, 86, 230, 0.7);
        }

        .jugador-2 .hp-bar-fill {
            background: linear-gradient(90deg, #a21caf, #d946ef);
            box-shadow: 0 0 8px rgba(217, 70, 239, 0.7);
        }

        .hp-bar-fill.critical {
            background: linear-gradient(90deg, #991b1b, #ef4444) !important;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.8) !important;
        }

        /* ===== BUTTONS ===== */
        .controles {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .btn-vida {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid transparent;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-vida:active {
            transform: scale(0.92) !important;
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .btn-remove:hover {
            background: rgba(239, 68, 68, 0.28);
            border-color: #ef4444;
            box-shadow: 0 0 18px rgba(239, 68, 68, 0.45);
            transform: scale(1.08);
        }

        .btn-add {
            background: rgba(74, 222, 128, 0.12);
            border-color: rgba(74, 222, 128, 0.45);
            color: #86efac;
        }

        .btn-add:hover {
            background: rgba(74, 222, 128, 0.25);
            border-color: #4ade80;
            box-shadow: 0 0 18px rgba(74, 222, 128, 0.4);
            transform: scale(1.08);
        }

        .label-control {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .controles-secundarios {
            display: flex;
            gap: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .btn-vida-small {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-vida-small:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            transform: scale(1.06);
        }

        .btn-vida-small:active {
            transform: scale(0.93);
        }

        /* ===== RESET BUTTON ===== */
        .btn-reset {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 6, 30, 0.9);
            color: rgba(167, 139, 250, 0.85);
            padding: 0.55rem 1.5rem;
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 20px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.2), 0 4px 15px rgba(0, 0, 0, 0.4);
            z-index: 100;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-reset:hover {
            background: rgba(124, 58, 237, 0.2);
            border-color: rgba(167, 139, 250, 0.7);
            color: #e0d7ff;
            box-shadow: 0 0 22px rgba(124, 58, 237, 0.4), 0 4px 15px rgba(0, 0, 0, 0.4);
            transform: translateX(-50%) translateY(-1px);
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-reduced-motion: reduce) {
            .vidas-display.critical {
                animation: none;
            }
            * {
                transition-duration: 0.01ms !important;
            }
        }

        .btn-vida:focus-visible,
        .btn-vida-small:focus-visible,
        .btn-reset:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .contador-container {
                display: grid;
                grid-template-rows: 6% 44% 44% 6%;
                flex-direction: unset;
            }

            /* Top/bottom black bars */
            .contador-container::before {
                content: '';
                background: #06030f;
                grid-row: 1;
            }

            .contador-container::after {
                /* Override divider: horizontal line in mobile */
                top: 50%;
                left: 0;
                width: 100%;
                height: 2px;
                transform: translateY(-50%);
                background: linear-gradient(
                    to right,
                    transparent 0%,
                    rgba(167, 139, 250, 0.6) 20%,
                    rgba(167, 139, 250, 0.9) 50%,
                    rgba(167, 139, 250, 0.6) 80%,
                    transparent 100%
                );
            }

            /* Footer bar */
            .contador-container > .jugador:last-of-type + * {
                background: #06030f;
                grid-row: 4;
            }

            .jugador {
                padding: 1% 2vw;
                justify-content: space-evenly;
                overflow: hidden;
            }

            .jugador:first-of-type {
                grid-row: 2;
            }

            .jugador:last-of-type {
                grid-row: 3;
            }

            .jugador-2 {
                transform: rotate(180deg);
            }

            .vidas-display {
                font-size: 13vh;
                margin: 0;
            }

            .nombre-jugador {
                font-size: 1.4vh;
                margin: 0;
            }

            .hp-bar-container {
                width: 60%;
                margin-bottom: 0.5rem;
            }

            .btn-vida {
                width: 20vw;
                height: 7vh;
                font-size: 2.8vh;
                border-radius: 12px;
            }

            .btn-vida-small {
                width: 20vw;
                height: 5.5vh;
                font-size: 2.2vh;
                border-radius: 12px;
            }

            .controles {
                gap: 4vw;
                margin: 0;
            }

            .controles-secundarios {
                gap: 4vw;
                margin: 0;
            }

            .label-control {
                font-size: 1.3vh;
                margin: 0;
            }

            .btn-reset {
                top: 50%;
                left: 0.5vw;
                transform: translateY(-50%);
                padding: 1.2vh 1.5vw;
                font-size: 1.6vh;
                writing-mode: vertical-rl;
                text-orientation: mixed;
                border-radius: 8px;
                letter-spacing: 0.08em;
            }

            .btn-reset:hover {
                transform: translateY(-50%);
            }
        }
    </style>
</head>
<body>
    <button class="btn-reset" onclick="resetearContador()">Reiniciar</button>

    <div class="contador-container">
        <!-- Jugador 2 (arriba, rotado 180° en móvil) -->
        <div class="jugador jugador-2" id="panel-j2">
            <div class="nombre-jugador">Jugador 2</div>
            <div class="vidas-display" id="vidas-j2">50</div>

            <div class="hp-bar-container">
                <div class="hp-bar-track">
                    <div class="hp-bar-fill" id="hp-bar-j2" style="width: 100%;"></div>
                </div>
            </div>

            <div class="controles">
                <button class="btn-vida btn-remove" onclick="cambiarVidas(2, -1)">-1</button>
                <button class="btn-vida btn-add" onclick="cambiarVidas(2, 1)">+1</button>
            </div>
            <div class="label-control">Individual</div>

            <div class="controles-secundarios">
                <button class="btn-vida-small" onclick="cambiarVidas(2, -5)">-5</button>
                <button class="btn-vida-small" onclick="cambiarVidas(2, 5)">+5</button>
            </div>
            <div class="label-control">Bloques de 5</div>
        </div>

        <!-- Jugador 1 (abajo, normal en móvil) -->
        <div class="jugador jugador-1" id="panel-j1">
            <div class="nombre-jugador">Jugador 1</div>
            <div class="vidas-display" id="vidas-j1">50</div>

            <div class="hp-bar-container">
                <div class="hp-bar-track">
                    <div class="hp-bar-fill" id="hp-bar-j1" style="width: 100%;"></div>
                </div>
            </div>

            <div class="controles">
                <button class="btn-vida btn-remove" onclick="cambiarVidas(1, -1)">-1</button>
                <button class="btn-vida btn-add" onclick="cambiarVidas(1, 1)">+1</button>
            </div>
            <div class="label-control">Individual</div>

            <div class="controles-secundarios">
                <button class="btn-vida-small" onclick="cambiarVidas(1, -5)">-5</button>
                <button class="btn-vida-small" onclick="cambiarVidas(1, 5)">+5</button>
            </div>
            <div class="label-control">Bloques de 5</div>
        </div>
    </div>

    <script>
        let vidasJ1 = 50;
        let vidasJ2 = 50;
        const MAX_VIDAS = 50;

        function cambiarVidas(jugador, cantidad) {
            if (jugador === 1) {
                vidasJ1 += cantidad;
                if (vidasJ1 < 0) vidasJ1 = 0;
                actualizarDisplay(1, vidasJ1);
            } else {
                vidasJ2 += cantidad;
                if (vidasJ2 < 0) vidasJ2 = 0;
                actualizarDisplay(2, vidasJ2);
            }

            verificarGanador();
        }

        function actualizarDisplay(jugador, vidas) {
            const display = document.getElementById(`vidas-j${jugador}`);
            const bar = document.getElementById(`hp-bar-j${jugador}`);
            const panel = document.getElementById(`panel-j${jugador}`);

            display.textContent = vidas;

            // HP bar
            const pct = Math.max(0, (vidas / MAX_VIDAS) * 100);
            bar.style.width = pct + '%';

            // Critical state
            const isCritical = vidas <= 10;
            if (isCritical) {
                display.classList.add('critical');
                bar.classList.add('critical');
                panel.classList.add('critical-state');
            } else {
                display.classList.remove('critical');
                bar.classList.remove('critical');
                panel.classList.remove('critical-state');
            }

            // Bounce animation
            display.style.transform = 'scale(1.18)';
            setTimeout(() => {
                display.style.transform = 'scale(1)';
            }, 150);
        }

        function resetearContador() {
            if (confirm('¿Reiniciar el contador de vidas?')) {
                vidasJ1 = 50;
                vidasJ2 = 50;
                actualizarDisplay(1, vidasJ1);
                actualizarDisplay(2, vidasJ2);
            }
        }

        function verificarGanador() {
            if (vidasJ1 === 0 && vidasJ2 === 0) {
                setTimeout(() => {
                    alert('¡Empate! Ambos jugadores llegaron a 0 vidas.');
                }, 300);
            } else if (vidasJ1 === 0) {
                setTimeout(() => {
                    alert('¡Jugador 2 gana! Jugador 1 ha llegado a 0 vidas.');
                }, 300);
            } else if (vidasJ2 === 0) {
                setTimeout(() => {
                    alert('¡Jugador 1 gana! Jugador 2 ha llegado a 0 vidas.');
                }, 300);
            }
        }

        // Soporte para teclado
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'q': cambiarVidas(1, 1); break;
                case 'a': cambiarVidas(1, -1); break;
                case 'w': cambiarVidas(1, 5); break;
                case 's': cambiarVidas(1, -5); break;
                case 'p': cambiarVidas(2, 1); break;
                case 'l': cambiarVidas(2, -1); break;
                case 'o': cambiarVidas(2, 5); break;
                case 'k': cambiarVidas(2, -5); break;
                case 'r': resetearContador(); break;
            }
        });
    </script>
</body>
</html>
