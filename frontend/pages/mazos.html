<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazos - Card Game Anime</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        /* ── Card global overrides ── */
        .card {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.95), rgba(35, 30, 80, 0.9));
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.15), 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.6);
            font-size: 0.85rem;
        }

        /* ── Mazo item ── */
        .mazo-item {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.95), rgba(35, 30, 80, 0.9));
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .mazo-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.25), 0 4px 20px rgba(0, 0, 0, 0.4);
            border-color: rgba(139, 92, 246, 0.45);
        }

        .mazo-nombre {
            font-family: 'Russo One', sans-serif;
            font-size: 1.35rem;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .mazo-serie {
            display: inline-block;
            background: rgba(124, 58, 237, 0.2);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.4);
            padding: 0.25rem 0.85rem;
            border-radius: 20px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .mazo-descripcion {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.75);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        /* ── Reducción de movimiento ── */
        @media (prefers-reduced-motion: reduce) {
            .mazo-item {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- Header Principal -->
    <header class="header-main">
        <div class="header-main-container">
            <div class="nav-brand">Card Game Anime</div>
            <div id="user-nav"></div>
        </div>
    </header>

    <!-- Header Navegación -->
    <nav class="header-nav">
        <div class="header-nav-container">
            <ul class="nav-links">
                <li><a href="historial.html">Historial</a></li>
                <li><a href="estadisticas.html">Estadísticas</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="noticias.html">Noticias</a></li>
                <li><a href="normas.html">Normas</a></li>
                <li><a href="combate.html">Registrar Combate</a></li>
                <li><a href="contador.html">Contador</a></li>
                <li><a href="compartir.html">Compartir</a></li>
                <li id="admin-link" style="display:none;"><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Mazos Disponibles</h1>
                <p class="card-subtitle">Conoce los mazos y sus estrategias</p>
            </div>

            <div id="mazos-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="mt-2">Cargando mazos...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Mostrar link de admin si es admin
        if (API.isAdmin()) {
            document.getElementById('admin-link').style.display = 'block';
        }

        async function cargarMazos() {
            const container = document.getElementById('mazos-container');

            try {
                const result = await API.getMazos();

                if (!result.success || result.mazos.length === 0) {
                    container.innerHTML = `
                        <p class="text-center" style="color: var(--text-secondary); padding: 2rem;">
                            No hay mazos disponibles.
                        </p>
                    `;
                    return;
                }

                let html = '';

                result.mazos.forEach(mazo => {
                    html += `
                        <div class="mazo-item">
                            <div class="mazo-nombre">${mazo.nombre}</div>
                            <div class="mazo-serie">${mazo.serie}</div>
                            <div class="mazo-descripcion">${mazo.descripcion}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (error) {
                container.innerHTML = `
                    <div class="alert alert-error">
                        Error al cargar mazos: ${error.message}
                    </div>
                `;
            }
        }

        // Cargar mazos al iniciar
        document.addEventListener('DOMContentLoaded', cargarMazos);
    </script>
</body>
</html>
