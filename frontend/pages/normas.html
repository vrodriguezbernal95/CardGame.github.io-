<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normas - Card Game Anime</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        .normas-tree {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .normas-tree ul {
            list-style: none;
            padding-left: 1.5rem;
            margin: 0;
        }

        .norma-item {
            margin-bottom: 0.35rem;
        }

        .norma-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: rgba(15, 12, 41, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
            user-select: none;
            font-family: 'Chakra Petch', sans-serif;
        }

        .norma-header:hover {
            background: rgba(35, 30, 80, 0.85);
            border-color: rgba(139, 92, 246, 0.55);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.2);
        }

        .norma-header.active {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.35), rgba(168, 85, 247, 0.25));
            border-color: rgba(167, 139, 250, 0.6);
            box-shadow: 0 0 18px rgba(124, 58, 237, 0.3);
        }

        .norma-toggle {
            font-size: 0.7rem;
            transition: transform 0.3s;
            width: 16px;
            text-align: center;
            flex-shrink: 0;
            color: #a78bfa;
        }

        @media (prefers-reduced-motion: reduce) {
            .norma-toggle { transition: none; }
        }

        .norma-toggle.open {
            transform: rotate(90deg);
        }

        .norma-titulo {
            font-weight: 600;
            font-size: 0.95rem;
            color: #e0d7ff;
            font-family: 'Chakra Petch', sans-serif;
        }

        .norma-header.nivel-0 .norma-titulo {
            font-size: 1.05rem;
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .norma-children {
            display: none;
            padding-top: 0.3rem;
        }

        .norma-children.open {
            display: block;
        }

        .norma-contenido {
            display: none;
            padding: 0.85rem 1rem 0.85rem 2.5rem;
            color: rgba(167, 139, 250, 0.75);
            line-height: 1.65;
            white-space: pre-wrap;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.9rem;
            border-left: 2px solid rgba(139, 92, 246, 0.3);
            margin-left: 1rem;
            margin-top: 0.25rem;
            background: rgba(15, 12, 41, 0.4);
            border-radius: 0 6px 6px 0;
        }

        .norma-contenido.open {
            display: block;
        }

        /* Hoja sin hijos ni contenido */
        .norma-header.leaf {
            cursor: default;
            padding-left: 2.5rem;
            opacity: 0.85;
        }

        .norma-header.leaf:hover {
            background: rgba(15, 12, 41, 0.7);
            border-color: rgba(139, 92, 246, 0.25);
            box-shadow: none;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(167, 139, 250, 0.6);
        }

        .empty-state p {
            font-size: 1.05rem;
            margin-top: 1rem;
            font-family: 'Chakra Petch', sans-serif;
        }

        *:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <!-- Header Principal -->
    <header class="header-main">
        <div class="header-main-container">
            <div class="nav-brand">Card Game Anime</div>
            <div id="user-nav"></div>
        </div>
    </header>

    <!-- Header Navegación -->
    <nav class="header-nav">
        <div class="header-nav-container">
            <ul class="nav-links">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="historial.html">Historial</a></li>
                <li><a href="estadisticas.html">Estadísticas</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="noticias.html">Noticias</a></li>
                <li><a href="normas.html">Normas</a></li>
                <li><a href="combate.html">Registrar Combate</a></li>
                <li><a href="contador.html">Contador</a></li>
                <li><a href="compartir.html">Compartir</a></li>
                <li id="admin-link" style="display:none;"><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Normas del Juego</h1>
                <p class="card-subtitle">Reglas y normativa oficial</p>
            </div>

            <div id="normas-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="mt-2">Cargando normas...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Mostrar link de admin si es admin
        if (API.isAdmin()) {
            document.getElementById('admin-link').style.display = 'block';
        }

        // Construir árbol desde lista plana
        function buildTree(normas) {
            const map = {};
            const roots = [];

            // Crear mapa de id -> nodo
            normas.forEach(norma => {
                map[norma.id] = { ...norma, children: [] };
            });

            // Construir relaciones padre-hijo
            normas.forEach(norma => {
                if (norma.parent_id && map[norma.parent_id]) {
                    map[norma.parent_id].children.push(map[norma.id]);
                } else {
                    roots.push(map[norma.id]);
                }
            });

            return roots;
        }

        // Renderizar árbol recursivamente
        function renderTree(nodes, nivel = 0) {
            if (nodes.length === 0) return '';

            let html = nivel === 0 ? '<ul class="normas-tree">' : '<ul>';

            nodes.forEach(node => {
                const hasChildren = node.children.length > 0;
                const hasContent = node.contenido && node.contenido.trim();
                const isExpandable = hasChildren || hasContent;

                html += `<li class="norma-item">`;

                if (isExpandable) {
                    html += `
                        <div class="norma-header nivel-${nivel}" onclick="toggleNorma(this)">
                            <span class="norma-toggle">▶</span>
                            <span class="norma-titulo">${escapeHtml(node.titulo)}</span>
                        </div>
                    `;

                    if (hasContent) {
                        html += `<div class="norma-contenido">${escapeHtml(node.contenido)}</div>`;
                    }

                    if (hasChildren) {
                        html += `<div class="norma-children">${renderTree(node.children, nivel + 1)}</div>`;
                    }
                } else {
                    html += `
                        <div class="norma-header leaf nivel-${nivel}">
                            <span class="norma-titulo">${escapeHtml(node.titulo)}</span>
                        </div>
                    `;
                }

                html += `</li>`;
            });

            html += '</ul>';
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Toggle desplegable
        function toggleNorma(header) {
            const item = header.parentElement;
            const toggle = header.querySelector('.norma-toggle');
            const children = item.querySelector('.norma-children');
            const contenido = item.querySelector('.norma-contenido');

            const isOpen = toggle.classList.contains('open');

            if (isOpen) {
                toggle.classList.remove('open');
                header.classList.remove('active');
                if (children) children.classList.remove('open');
                if (contenido) contenido.classList.remove('open');
            } else {
                toggle.classList.add('open');
                header.classList.add('active');
                if (children) children.classList.add('open');
                if (contenido) contenido.classList.add('open');
            }
        }

        // Cargar normas
        async function cargarNormas() {
            const container = document.getElementById('normas-container');

            try {
                const result = await API.getNormas();

                if (result.success && result.normas.length > 0) {
                    const tree = buildTree(result.normas);
                    container.innerHTML = renderTree(tree);
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>No hay normas publicadas todavía.</p>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="alert alert-error">
                        Error al cargar las normas: ${error.message}
                    </div>
                `;
            }
        }

        // Inicializar
        cargarNormas();
    </script>
</body>
</html>
