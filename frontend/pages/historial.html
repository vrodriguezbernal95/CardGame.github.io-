<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Partidas - Card Game Anime</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        /* ===== TYPOGRAPHY ===== */
        body {
            font-family: 'Chakra Petch', 'Segoe UI', sans-serif;
        }

        /* ===== CARD OVERRIDE (dark gaming) ===== */
        .card {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.95), rgba(35, 30, 80, 0.9));
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.15), 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            border-bottom: 1px solid rgba(139, 92, 246, 0.25);
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
        }

        .card-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.9rem;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #e0d7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.6);
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-top: 0.35rem;
        }

        /* ===== FILTROS ===== */
        .filtros-container {
            background: rgba(20, 17, 60, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .filtros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .form-label {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(167, 139, 250, 0.7);
        }

        .form-control,
        .form-select {
            background: rgba(15, 12, 41, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #e0d7ff;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.9rem;
            border-radius: 8px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
            outline: none;
            background: rgba(20, 17, 60, 0.9);
        }

        .form-select option {
            background: #1e1b4b;
            color: #e0d7ff;
        }

        /* Date input color fix */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7) sepia(1) saturate(3) hue-rotate(230deg);
            cursor: pointer;
        }

        .filtros-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        /* ===== BUTTONS OVERRIDE ===== */
        .btn-primary {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.65);
        }

        .btn-secondary {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: transparent;
            color: rgba(167, 139, 250, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.35);
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: rgba(167, 139, 250, 0.6);
            color: #a78bfa;
        }

        /* ===== TABLE OVERRIDE ===== */
        .table {
            border-radius: 8px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(135deg, #4c1d95, #6d28d9);
        }

        .table thead th {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(224, 215, 255, 0.9);
            padding: 1rem;
            border: none;
        }

        .table tbody tr {
            background: rgba(20, 17, 60, 0.6);
            border-bottom: 1px solid rgba(139, 92, 246, 0.12);
            transition: background 0.2s;
        }

        .table tbody tr:hover {
            background: rgba(124, 58, 237, 0.12);
        }

        .table tbody td {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.88rem;
            color: #e0d7ff;
            padding: 0.9rem 1rem;
            vertical-align: middle;
        }

        .table tbody td strong {
            font-weight: 600;
            color: #ffffff;
        }

        .table tbody td small {
            color: rgba(167, 139, 250, 0.55) !important;
            font-size: 0.75rem;
            font-family: 'Chakra Petch', sans-serif;
        }

        /* VS column */
        .vs-cell {
            text-align: center;
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
            color: #ec4899;
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.6);
            letter-spacing: 0.05em;
        }

        /* Notes row */
        .notes-row td {
            background: rgba(124, 58, 237, 0.08) !important;
            color: rgba(167, 139, 250, 0.7) !important;
            font-style: italic;
            font-size: 0.82rem;
            border-left: 3px solid rgba(124, 58, 237, 0.4);
        }

        /* ===== BADGES OVERRIDE ===== */
        .badge-info {
            background: rgba(124, 58, 237, 0.2);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.35);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.78rem;
        }

        .badge-error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.78rem;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.78rem;
        }

        /* ===== PAGINATION OVERRIDE ===== */
        .pagination-btn {
            background: rgba(20, 17, 60, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #a78bfa;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(124, 58, 237, 0.25);
            border-color: #7c3aed;
            color: #e0d7ff;
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.35);
        }

        .pagination-btn.active {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-color: #7c3aed;
            color: white;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.5);
        }

        .pagination-btn:disabled {
            opacity: 0.3;
        }

        .pagination-ellipsis {
            color: rgba(167, 139, 250, 0.5);
        }

        .pagination-info {
            color: rgba(167, 139, 250, 0.55);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        /* ===== LOADING ===== */
        .loading p {
            font-family: 'Chakra Petch', sans-serif;
            color: rgba(167, 139, 250, 0.6);
            letter-spacing: 0.05em;
        }

        /* ===== ALERT OVERRIDE ===== */
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-family: 'Chakra Petch', sans-serif;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .filtros-container {
                padding: 1rem;
                margin-bottom: 1.5rem;
            }

            .filtros-grid {
                grid-template-columns: 1fr;
                gap: 0.9rem;
            }

            .filtros-actions {
                flex-direction: column;
                gap: 0.75rem;
                margin-top: 0.5rem;
            }

            .filtros-actions .btn {
                width: 100%;
                padding: 0.75rem;
            }
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }

        .btn:focus-visible,
        .pagination-btn:focus-visible,
        .form-control:focus-visible,
        .form-select:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <!-- Header Principal -->
    <header class="header-main">
        <div class="header-main-container">
            <div class="nav-brand">Card Game Anime</div>
            <div id="user-nav"></div>
        </div>
    </header>

    <!-- Header Navegación -->
    <nav class="header-nav">
        <div class="header-nav-container">
            <ul class="nav-links">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="historial.html">Historial</a></li>
                <li><a href="estadisticas.html">Estadísticas</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="noticias.html">Noticias</a></li>
                <li><a href="normas.html">Normas</a></li>
                <li><a href="combate.html">Registrar Combate</a></li>
                <li><a href="contador.html">Contador</a></li>
                <li><a href="compartir.html">Compartir</a></li>
                <li id="admin-link" style="display:none;"><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Historial de Partidas</h1>
                <p class="card-subtitle">Todas las batallas épicas registradas</p>
            </div>

            <!-- Filtros -->
            <div class="filtros-container">
                <div class="filtros-grid">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="filtro-fecha-desde">Fecha desde</label>
                        <input type="date" id="filtro-fecha-desde" class="form-control">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="filtro-fecha-hasta">Fecha hasta</label>
                        <input type="date" id="filtro-fecha-hasta" class="form-control">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="filtro-jugador">Jugador</label>
                        <select id="filtro-jugador" class="form-control">
                            <option value="">Todos los jugadores</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="filtro-mazo">Mazo</label>
                        <select id="filtro-mazo" class="form-control">
                            <option value="">Todos los mazos</option>
                        </select>
                    </div>
                </div>
                <div class="filtros-actions">
                    <button onclick="limpiarFiltros()" class="btn btn-secondary">Limpiar Filtros</button>
                    <button onclick="aplicarFiltros()" class="btn btn-primary">Aplicar Filtros</button>
                </div>
            </div>

            <div id="partidas-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="mt-2">Cargando partidas...</p>
                </div>
            </div>

            <!-- Controles de paginación -->
            <div id="paginacion-container" style="display: none;"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Mostrar link de admin si es admin
        if (API.isAdmin()) {
            document.getElementById('admin-link').style.display = 'block';
        }

        let todasLasPartidas = [];
        let jugadores = new Set();
        let mazos = new Set();
        let paginaActual = 1;
        let totalPaginas = 1;
        const PARTIDAS_POR_PAGINA = 50;
        let filtrosActivos = {};

        async function cargarDatos(pagina = 1, filtros = {}) {
            const container = document.getElementById('partidas-container');
            paginaActual = pagina;
            filtrosActivos = filtros;

            try {
                const result = await API.getPartidas(pagina, PARTIDAS_POR_PAGINA, filtros);

                if (!result.success || result.partidas.length === 0) {
                    container.innerHTML = `
                        <p class="text-center" style="color: rgba(167, 139, 250, 0.6); padding: 2rem; font-family: 'Chakra Petch', sans-serif;">
                            No se encontraron partidas con los filtros seleccionados.
                        </p>
                    `;
                    document.getElementById('paginacion-container').style.display = 'none';
                    return;
                }

                todasLasPartidas = result.partidas;
                totalPaginas = result.pagination.totalPages;

                // Cargar jugadores y mazos para selects (solo primera vez sin filtros)
                if (pagina === 1 && Object.keys(filtros).length === 0) {
                    await cargarOpcionesFiltros();
                }

                // Renderizar partidas
                renderizarPartidas(todasLasPartidas);

                // Renderizar paginación
                renderizarPaginacion(result.pagination);

            } catch (error) {
                container.innerHTML = `
                    <div class="alert alert-error">
                        Error al cargar las partidas: ${error.message}
                    </div>
                `;
            }
        }

        async function cargarOpcionesFiltros() {
            try {
                const result = await API.getOpcionesFiltrosPartidas();

                if (result.success) {
                    const selectJugador = document.getElementById('filtro-jugador');
                    const selectMazo = document.getElementById('filtro-mazo');

                    selectJugador.innerHTML = '<option value="">Todos los jugadores</option>';
                    selectMazo.innerHTML = '<option value="">Todos los mazos</option>';

                    result.jugadores.forEach(jugador => {
                        const option = document.createElement('option');
                        option.value = jugador;
                        option.textContent = jugador;
                        selectJugador.appendChild(option);
                    });

                    result.mazos.forEach(mazo => {
                        const option = document.createElement('option');
                        option.value = mazo;
                        option.textContent = mazo;
                        selectMazo.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error cargando opciones de filtros:', error);
            }
        }

        function renderizarPartidas(partidas) {
            const container = document.getElementById('partidas-container');

            if (partidas.length === 0) {
                container.innerHTML = `
                    <p class="text-center" style="color: rgba(167, 139, 250, 0.6); padding: 2rem; font-family: 'Chakra Petch', sans-serif;">
                        No se encontraron partidas con los filtros seleccionados.
                    </p>
                `;
                return;
            }

            let html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Jugador 1</th>
                            <th>Mazo 1</th>
                            <th style="text-align: center;">VS</th>
                            <th>Jugador 2</th>
                            <th>Mazo 2</th>
                            <th>Resultado</th>
                            <th>Ganador</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            partidas.forEach(partida => {
                const fecha = UI.formatDate(partida.fecha_partida);
                const ganador = partida.ganador_nombre || 'Empate';
                const badgeClass = UI.getBadgeClass(partida.resultado);

                html += `
                    <tr>
                        <td>${fecha}</td>
                        <td><strong>${partida.jugador1_nombre}</strong></td>
                        <td>
                            <span class="badge badge-info">${partida.mazo1_nombre}</span>
                            <br><small>${partida.mazo1_serie}</small>
                        </td>
                        <td class="vs-cell">VS</td>
                        <td><strong>${partida.jugador2_nombre}</strong></td>
                        <td>
                            <span class="badge badge-info">${partida.mazo2_nombre}</span>
                            <br><small>${partida.mazo2_serie}</small>
                        </td>
                        <td>
                            <span class="badge ${badgeClass}">${UI.formatResultado(partida.resultado)}</span>
                        </td>
                        <td><strong>${ganador}</strong></td>
                    </tr>
                `;

                if (partida.notas) {
                    html += `
                        <tr class="notes-row">
                            <td colspan="8">${partida.notas}</td>
                        </tr>
                    `;
                }
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function renderizarPaginacion(pagination) {
            const container = document.getElementById('paginacion-container');

            if (pagination.totalPages <= 1) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';

            let html = '<div class="pagination">';

            html += `
                <button class="pagination-btn" ${!pagination.hasPrevPage ? 'disabled' : ''} onclick="cambiarPagina(${pagination.page - 1})">
                    &laquo; Anterior
                </button>
            `;

            const maxBotones = 7;
            let inicio = Math.max(1, pagination.page - Math.floor(maxBotones / 2));
            let fin = Math.min(pagination.totalPages, inicio + maxBotones - 1);

            if (fin - inicio < maxBotones - 1) {
                inicio = Math.max(1, fin - maxBotones + 1);
            }

            if (inicio > 1) {
                html += `<button class="pagination-btn" onclick="cambiarPagina(1)">1</button>`;
                if (inicio > 2) {
                    html += `<span class="pagination-ellipsis">...</span>`;
                }
            }

            for (let i = inicio; i <= fin; i++) {
                html += `
                    <button class="pagination-btn ${i === pagination.page ? 'active' : ''}" onclick="cambiarPagina(${i})">
                        ${i}
                    </button>
                `;
            }

            if (fin < pagination.totalPages) {
                if (fin < pagination.totalPages - 1) {
                    html += `<span class="pagination-ellipsis">...</span>`;
                }
                html += `<button class="pagination-btn" onclick="cambiarPagina(${pagination.totalPages})">${pagination.totalPages}</button>`;
            }

            html += `
                <button class="pagination-btn" ${!pagination.hasNextPage ? 'disabled' : ''} onclick="cambiarPagina(${pagination.page + 1})">
                    Siguiente &raquo;
                </button>
            `;

            html += '</div>';

            const inicio_registro = (pagination.page - 1) * pagination.limit + 1;
            const fin_registro = Math.min(pagination.page * pagination.limit, pagination.total);
            html += `
                <div class="pagination-info">
                    Mostrando ${inicio_registro}&ndash;${fin_registro} de ${pagination.total} partidas
                </div>
            `;

            container.innerHTML = html;
        }

        function cambiarPagina(pagina) {
            cargarDatos(pagina, filtrosActivos);
        }

        function aplicarFiltros() {
            const fechaDesde = document.getElementById('filtro-fecha-desde').value;
            const fechaHasta = document.getElementById('filtro-fecha-hasta').value;
            const jugador = document.getElementById('filtro-jugador').value;
            const mazo = document.getElementById('filtro-mazo').value;

            const filtros = {};
            if (fechaDesde) filtros.fechaDesde = fechaDesde;
            if (fechaHasta) filtros.fechaHasta = fechaHasta;
            if (jugador) filtros.jugador = jugador;
            if (mazo) filtros.mazo = mazo;

            cargarDatos(1, filtros);
        }

        function limpiarFiltros() {
            document.getElementById('filtro-fecha-desde').value = '';
            document.getElementById('filtro-fecha-hasta').value = '';
            document.getElementById('filtro-jugador').value = '';
            document.getElementById('filtro-mazo').value = '';
            cargarDatos(1, {});
        }

        document.addEventListener('DOMContentLoaded', () => cargarDatos(1));
    </script>
</body>
</html>
